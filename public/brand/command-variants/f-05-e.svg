<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-labelledby="title desc">
  <title id="title">F-05E Glow Command</title>
  <desc id="desc">A brighter F-05 command capsule variant with stronger active-state glow.</desc>
  <defs>
    <linearGradient id="bg" x1="14" y1="8" x2="86" y2="94" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2d3733"/>
      <stop offset=".52" stop-color="#111816"/>
      <stop offset="1" stop-color="#060807"/>
    </linearGradient>
    <radialGradient id="halo" cx="67" cy="47" r="36" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4edd7a" stop-opacity=".26"/>
      <stop offset=".62" stop-color="#173320" stop-opacity=".08"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="capsule" x1="20" y1="35" x2="80" y2="66" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fffff5"/>
      <stop offset="1" stop-color="#d4ecd9"/>
    </linearGradient>
    <linearGradient id="green" x1="55" y1="31" x2="76" y2="56" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#d6ff7d"/>
      <stop offset="1" stop-color="#26cf7e"/>
    </linearGradient>
    <filter id="shadow" x="-24%" y="-24%" width="148%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#000000" flood-opacity=".34"/>
      <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#42d978" flood-opacity=".22"/>
    </filter>
  </defs>
  <rect x="5.5" y="5.5" width="89" height="89" rx="25.5" fill="url(#bg)"/>
  <rect x="5.5" y="5.5" width="89" height="89" rx="25.5" fill="url(#halo)"/>
  <g filter="url(#shadow)">
    <rect x="18.5" y="35" width="63" height="30" rx="15" fill="url(#capsule)"/>
    <circle cx="33" cy="50" r="6.2" fill="none" stroke="#627069" stroke-width="3.1"/>
    <path d="M37.6 54.6l5.2 5.2" stroke="#627069" stroke-width="3.1" stroke-linecap="round"/>
    <path d="M49 50h13" stroke="#56625d" stroke-width="4" stroke-linecap="round"/>
    <circle cx="69" cy="50" r="5.8" fill="url(#green)"/>
  </g>
  <path d="M59 29c6.7-4.6 14.8-3.4 20.4 2.5" fill="none" stroke="#77ee98" stroke-linecap="round" stroke-width="3.4"/>
</svg>
