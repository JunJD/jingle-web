<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-labelledby="title desc">
  <title id="title">F-05I Left Flow Command</title>
  <desc id="desc">A directional F-05 command capsule with light entering from the left and execution moving to the right.</desc>
  <defs>
    <linearGradient id="bg" x1="12" y1="7" x2="88" y2="94" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#34413c"/>
      <stop offset=".46" stop-color="#121917"/>
      <stop offset="1" stop-color="#050807"/>
    </linearGradient>
    <radialGradient id="leftGlow" cx="25" cy="38" r="48" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#edf5c7" stop-opacity=".18"/>
      <stop offset=".42" stop-color="#54d778" stop-opacity=".12"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="capsule" x1="18" y1="34" x2="82" y2="66" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset=".48" stop-color="#eef7e8"/>
      <stop offset="1" stop-color="#bfdcc8"/>
    </linearGradient>
    <linearGradient id="rim" x1="18" y1="36" x2="74" y2="62" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity=".58"/>
      <stop offset=".6" stop-color="#ffffff" stop-opacity=".08"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="green" x1="58" y1="32" x2="77" y2="57" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#d4ff82"/>
      <stop offset="1" stop-color="#25c879"/>
    </linearGradient>
    <filter id="shadow" x="-24%" y="-24%" width="148%" height="160%">
      <feDropShadow dx="3" dy="9" stdDeviation="6" flood-color="#000000" flood-opacity=".36"/>
    </filter>
  </defs>
  <rect x="5.5" y="5.5" width="89" height="89" rx="25.5" fill="url(#bg)"/>
  <rect x="5.5" y="5.5" width="89" height="89" rx="25.5" fill="url(#leftGlow)"/>
  <g filter="url(#shadow)">
    <rect x="17.5" y="34.5" width="64" height="31" rx="15.5" fill="url(#capsule)"/>
    <path d="M24 38.8h44" fill="none" stroke="url(#rim)" stroke-linecap="round" stroke-width="3.2"/>
    <circle cx="33" cy="49.5" r="6" fill="none" stroke="#627069" stroke-width="3"/>
    <circle cx="34.2" cy="48.7" r="1.75" fill="#627069"/>
    <path d="M39.1 54.2l4.5 4.5" stroke="#627069" stroke-width="2.8" stroke-linecap="round"/>
    <path d="M50 49.5h11.5" stroke="#56625d" stroke-width="3.8" stroke-linecap="round"/>
    <circle cx="69.5" cy="49.5" r="5.8" fill="url(#green)"/>
    <circle cx="68.7" cy="47.5" r="1.45" fill="#efffd5" opacity=".82"/>
  </g>
  <path d="M58.5 29.2c6.8-4.4 14.8-3.1 20.2 2.8" fill="none" stroke="#76ee99" stroke-linecap="round" stroke-width="3.3"/>
</svg>
