<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-labelledby="title desc">
  <title id="title">F-05D Compact Launcher</title>
  <desc id="desc">A compact F-05 command capsule variant with more app-icon presence.</desc>
  <defs>
    <linearGradient id="bg" x1="14" y1="8" x2="86" y2="94" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2b3632"/>
      <stop offset=".52" stop-color="#111816"/>
      <stop offset="1" stop-color="#060807"/>
    </linearGradient>
    <linearGradient id="capsule" x1="24" y1="36" x2="77" y2="66" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fbfff8"/>
      <stop offset="1" stop-color="#d0ead7"/>
    </linearGradient>
    <linearGradient id="green" x1="56" y1="32" x2="75" y2="56" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#b9f46e"/>
      <stop offset="1" stop-color="#26c779"/>
    </linearGradient>
    <filter id="shadow" x="-22%" y="-24%" width="144%" height="154%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#000000" flood-opacity=".36"/>
    </filter>
  </defs>
  <rect x="5.5" y="5.5" width="89" height="89" rx="25.5" fill="url(#bg)"/>
  <g filter="url(#shadow)">
    <rect x="22" y="35.5" width="56" height="30" rx="15" fill="url(#capsule)"/>
    <circle cx="35" cy="50.5" r="5.4" fill="none" stroke="#627069" stroke-width="3"/>
    <path d="M39.1 54.6l4.5 4.5" stroke="#627069" stroke-width="3" stroke-linecap="round"/>
    <path d="M50 50.5h11.5" stroke="#56625d" stroke-width="3.8" stroke-linecap="round"/>
    <circle cx="67.5" cy="50.5" r="5.4" fill="url(#green)"/>
  </g>
  <path d="M58.5 29.5c6.2-3.9 13.8-2.8 18.8 2.7" fill="none" stroke="#69e58b" stroke-linecap="round" stroke-width="3.1"/>
</svg>
