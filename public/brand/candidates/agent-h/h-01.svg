<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-labelledby="title desc">
  <title id="title">Jingle candidate H-01</title>
  <desc id="desc">A single glowing chime dot with one clean signal arc.</desc>
  <defs>
    <linearGradient id="bg" x1="13" y1="7" x2="87" y2="94" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#26302c"/>
      <stop offset=".56" stop-color="#111916"/>
      <stop offset="1" stop-color="#050706"/>
    </linearGradient>
    <radialGradient id="aura" cx="50" cy="47" r="38" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fff4aa" stop-opacity=".42"/>
      <stop offset=".2" stop-color="#f7bc35" stop-opacity=".22"/>
      <stop offset=".54" stop-color="#33d884" stop-opacity=".1"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="seed" cx="40" cy="36" r="24" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fff8c6"/>
      <stop offset=".42" stop-color="#f2c04a"/>
      <stop offset=".78" stop-color="#d57a1f"/>
      <stop offset="1" stop-color="#833f12"/>
    </radialGradient>
    <filter id="softGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 0.95  0 1 0 0 0.58  0 0 1 0 0.12  0 0 0 .75 0" result="warmBlur"/>
      <feMerge>
        <feMergeNode in="warmBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect x="5.5" y="5.5" width="89" height="89" rx="25.5" fill="url(#bg)"/>
  <rect x="5.5" y="5.5" width="89" height="89" rx="25.5" fill="url(#aura)"/>
  <path d="M38.5 40.5c3.4-4.2 7.5-6.2 11.5-6.2s8.1 2 11.5 6.2" fill="none" stroke="#79ee9a" stroke-linecap="round" stroke-width="3.1" opacity=".46"/>
  <g filter="url(#softGlow)">
    <circle cx="50" cy="51" r="13.2" fill="#f7b934" opacity=".16"/>
    <circle cx="50" cy="51" r="9.8" fill="url(#seed)"/>
    <circle cx="46.8" cy="47.1" r="2.8" fill="#fff8cc" opacity=".92"/>
  </g>
</svg>
