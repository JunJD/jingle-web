    <rect x="37" y="29" width="26" height="42" rx="13" fill="url(#inside)"/>
    <path d="M39.5 35c5.7-6.4 15.8-6.3 21 .3" fill="none" stroke="#f9ffc0" stroke-linecap="round" stroke-width="3.2" opacity=".56"/>
    <path d="M36 58c2.8 8 8.1 12.2 14 12.2s11.2-4.2 14-12.2" fill="none" stroke="#f0dc70" stroke-linecap="round" stroke-width="2.6" opacity=".34"/>
