<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-labelledby="title desc">
  <title id="title">Jingle candidate G-05</title>
  <desc id="desc">Clean portal icon for Jingle: one rounded doorway, a dark inner pocket, and a restrained chime highlight.</desc>
  <defs>
