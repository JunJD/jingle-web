      <stop offset="0" stop-color="#26342e"/>
      <stop offset=".56" stop-color="#101815"/>
      <stop offset="1" stop-color="#050807"/>
    </linearGradient>
    <radialGradient id="halo" cx="50" cy="43" r="42" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2f5a3b" stop-opacity=".52"/>
      <stop offset=".62" stop-color="#132118" stop-opacity=".14"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ring" x1="30" y1="17" x2="73" y2="83" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fff1a8"/>
      <stop offset=".26" stop-color="#e0c94b"/>
      <stop offset=".58" stop-color="#58d874"/>
      <stop offset="1" stop-color="#0a9a5f"/>
