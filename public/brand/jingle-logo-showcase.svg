<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 960" role="img" aria-labelledby="title desc">
  <title id="title">Jingle logo exploration board</title>
  <desc id="desc">Six richer Jingle logo directions with app icon previews and product usage examples.</desc>
  <defs>
    <radialGradient id="boardGlow" cx="50%" cy="0%" r="90%">
      <stop offset="0" stop-color="#1f2824"/>
      <stop offset=".52" stop-color="#0d1110"/>
      <stop offset="1" stop-color="#060707"/>
    </radialGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2b302d"/>
      <stop offset=".55" stop-color="#151817"/>
      <stop offset="1" stop-color="#090a09"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff0b7"/>
      <stop offset=".5" stop-color="#d99a28"/>
      <stop offset="1" stop-color="#8c5218"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#98ef78"/>
      <stop offset="1" stop-color="#22a971"/>
    </linearGradient>
    <filter id="softDrop" x="-30%" y="-30%" width="160%" height="180%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity=".45"/>
    </filter>
    <filter id="tinyDrop" x="-30%" y="-30%" width="160%" height="180%">
      <feDropShadow dx="0" dy="7" stdDeviation="6" flood-color="#000000" flood-opacity=".42"/>
    </filter>
    <style>
      .eyebrow{font:600 12px -apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;letter-spacing:.14em;text-transform:uppercase;fill:#c7a35c}
      .title{font:600 17px -apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;fill:#f4f0e6}
      .copy{font:400 13px -apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;fill:#b6b0a4}
      .small{font:500 11px -apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;fill:#8e8a81}
      .mono{font:500 11px ui-monospace,SFMono-Regular,Menlo,monospace;fill:#d8bd7a}
      .number{font:700 15px -apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;fill:#e6bc58}
      .uiTitle{font:600 14px -apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;fill:#f6f2ea}
      .uiCopy{font:400 11px -apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;fill:#aaa69e}
    </style>
  </defs>

  <rect width="1440" height="960" fill="url(#boardGlow)"/>
  <rect x="24" y="24" width="1392" height="912" rx="34" fill="none" stroke="#ffffff" stroke-opacity=".05"/>

  <g transform="translate(44 42)">
    <text class="eyebrow" x="0" y="0">Jingle / Brand Exploration</text>
    <text class="copy" x="0" y="28">A bell signal, a universal command pocket, and a desktop launcher surface.</text>
  </g>

  <g id="variants" transform="translate(36 86)">
    <g transform="translate(0 0)">
      <circle cx="92" cy="0" r="15" fill="none" stroke="#e1b64d" stroke-width="1.5"/>
      <text class="number" x="88" y="5">1</text>
      <text class="title" x="16" y="44">Bell + Command Pocket</text>
      <text class="copy" x="34" y="68">A bell signal inside a command pocket.</text>
      <image href="variants/jingle-variant-01-bell-pocket.svg" x="35" y="105" width="132" height="132" filter="url(#softDrop)"/>
      <image href="variants/jingle-variant-01-bell-pocket.svg" x="28" y="286" width="64" height="64" filter="url(#tinyDrop)"/>
      <image href="variants/jingle-variant-01-bell-pocket.svg" x="116" y="302" width="44" height="44" filter="url(#tinyDrop)"/>
    </g>

    <g transform="translate(226 0)">
      <circle cx="92" cy="0" r="15" fill="none" stroke="#e1b64d" stroke-width="1.5"/>
      <text class="number" x="88" y="5">2</text>
      <text class="title" x="22" y="44">Abstract J-Shaped Chime</text>
      <text class="copy" x="52" y="68">A J that rings. Simple and memorable.</text>
      <image href="variants/jingle-variant-02-j-chime.svg" x="35" y="105" width="132" height="132" filter="url(#softDrop)"/>
      <image href="variants/jingle-variant-02-j-chime.svg" x="28" y="286" width="64" height="64" filter="url(#tinyDrop)"/>
      <image href="variants/jingle-variant-02-j-chime.svg" x="116" y="302" width="44" height="44" filter="url(#tinyDrop)"/>
    </g>

    <g transform="translate(452 0)">
      <circle cx="92" cy="0" r="15" fill="none" stroke="#e1b64d" stroke-width="1.5"/>
      <text class="number" x="88" y="5">3</text>
      <text class="title" x="34" y="44">Utility Pocket with Signal</text>
      <text class="copy" x="58" y="68">A compact pocket holding your tools.</text>
      <image href="variants/jingle-variant-03-utility-pocket.svg" x="35" y="105" width="132" height="132" filter="url(#softDrop)"/>
      <image href="variants/jingle-variant-03-utility-pocket.svg" x="28" y="286" width="64" height="64" filter="url(#tinyDrop)"/>
      <image href="variants/jingle-variant-03-utility-pocket.svg" x="116" y="302" width="44" height="44" filter="url(#tinyDrop)"/>
    </g>

    <g transform="translate(678 0)">
      <circle cx="92" cy="0" r="15" fill="none" stroke="#e1b64d" stroke-width="1.5"/>
      <text class="number" x="88" y="5">4</text>
      <text class="title" x="34" y="44">Desktop Command Tile</text>
      <text class="copy" x="34" y="68">A command key tile that summons everything.</text>
      <image href="variants/jingle-variant-04-command-tile.svg" x="35" y="105" width="132" height="132" filter="url(#softDrop)"/>
      <image href="variants/jingle-variant-04-command-tile.svg" x="28" y="286" width="64" height="64" filter="url(#tinyDrop)"/>
      <image href="variants/jingle-variant-04-command-tile.svg" x="116" y="302" width="44" height="44" filter="url(#tinyDrop)"/>
    </g>

    <g transform="translate(904 0)">
      <circle cx="92" cy="0" r="15" fill="none" stroke="#e1b64d" stroke-width="1.5"/>
      <text class="number" x="88" y="5">5</text>
      <text class="title" x="37" y="44">Magical Drawer / Portal</text>
      <text class="copy" x="53" y="68">Open the drawer, tools appear.</text>
      <image href="variants/jingle-variant-05-magic-drawer.svg" x="35" y="105" width="132" height="132" filter="url(#softDrop)"/>
      <image href="variants/jingle-variant-05-magic-drawer.svg" x="28" y="286" width="64" height="64" filter="url(#tinyDrop)"/>
      <image href="variants/jingle-variant-05-magic-drawer.svg" x="116" y="302" width="44" height="44" filter="url(#tinyDrop)"/>
    </g>

    <g transform="translate(1130 0)">
      <circle cx="92" cy="0" r="15" fill="none" stroke="#e1b64d" stroke-width="1.5"/>
      <text class="number" x="88" y="5">6</text>
      <text class="title" x="58" y="44">Minimal App Icon</text>
      <text class="copy" x="52" y="68">A compact mark for macOS and beyond.</text>
      <image href="variants/jingle-variant-06-minimal-jingle.svg" x="35" y="105" width="132" height="132" filter="url(#softDrop)"/>
      <image href="variants/jingle-variant-06-minimal-jingle.svg" x="28" y="286" width="64" height="64" filter="url(#tinyDrop)"/>
      <image href="variants/jingle-variant-06-minimal-jingle.svg" x="116" y="302" width="44" height="44" filter="url(#tinyDrop)"/>
    </g>
  </g>

  <g transform="translate(36 470)">
    <line x1="0" x2="582" y1="0" y2="0" stroke="#fff" stroke-opacity=".12"/>
    <text class="eyebrow" x="610" y="5">Usage Examples</text>
    <line x1="780" x2="1368" y1="0" y2="0" stroke="#fff" stroke-opacity=".12"/>
  </g>

  <g transform="translate(36 526)" filter="url(#softDrop)">
    <rect x="0" y="0" width="300" height="108" rx="18" fill="url(#card)" stroke="#fff" stroke-opacity=".08"/>
    <rect x="22" y="28" width="51" height="51" rx="12" fill="#69b6ed"/>
    <rect x="87" y="28" width="51" height="51" rx="12" fill="#2d3330"/>
    <image href="jingle-mark.svg" x="87" y="28" width="51" height="51"/>
    <rect x="152" y="28" width="51" height="51" rx="12" fill="#4cc36a"/>
    <rect x="217" y="28" width="51" height="51" rx="12" fill="#e7ecea"/>
    <circle cx="112.5" cy="92" r="2.6" fill="#d8a33d"/>
  </g>

  <g transform="translate(380 500)" filter="url(#softDrop)">
    <rect x="0" y="0" width="420" height="304" rx="24" fill="url(#card)" stroke="#fff" stroke-opacity=".09"/>
    <image href="jingle-mark.svg" x="24" y="24" width="32" height="32"/>
    <text class="uiCopy" x="72" y="45">Ask Jingle or type a command...</text>
    <rect x="370" y="24" width="30" height="28" rx="8" fill="#ffffff" fill-opacity=".08"/>
    <text class="small" x="376" y="43">⌘K</text>
    <line x1="24" y1="72" x2="396" y2="72" stroke="#fff" stroke-opacity=".07"/>
    <rect x="24" y="92" width="48" height="26" rx="13" fill="#ffffff" fill-opacity=".12"/>
    <text class="uiCopy" x="42" y="109">All</text>
    <text class="uiCopy" x="96" y="109">Tools</text>
    <text class="uiCopy" x="150" y="109">AI</text>
    <text class="uiCopy" x="195" y="109">Extensions</text>
    <text class="uiCopy" x="282" y="109">Files</text>
    <g transform="translate(24 146)">
      <rect width="372" height="46" rx="12" fill="#ffffff" fill-opacity=".065"/>
      <rect x="12" y="9" width="28" height="28" rx="8" fill="#2dbb74"/>
      <path d="M20 23h16M28 15v16" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
      <text class="uiTitle" x="54" y="21">Screenshot</text>
      <text class="uiCopy" x="54" y="38">Capture area or window</text>
      <rect x="330" y="11" width="28" height="24" rx="7" fill="#4b2a64"/>
      <text class="small" x="337" y="28">⌘1</text>
    </g>
    <g transform="translate(24 202)">
      <rect x="12" y="9" width="28" height="28" rx="8" fill="#8057d8"/>
      <path d="M26 15l3 8 8 3-8 3-3 8-3-8-8-3 8-3z" fill="#fff"/>
      <text class="uiTitle" x="54" y="21">Summarize</text>
      <text class="uiCopy" x="54" y="38">AI summarize selected text</text>
      <rect x="330" y="11" width="28" height="24" rx="7" fill="#4b2a64"/>
      <text class="small" x="337" y="28">⌘2</text>
    </g>
    <g transform="translate(24 258)">
      <rect x="12" y="9" width="28" height="28" rx="8" fill="#2f76d8"/>
      <circle cx="26" cy="23" r="9" fill="none" stroke="#fff" stroke-width="2"/>
      <path d="M17 23h18M26 14c4 5 4 13 0 18M26 14c-4 5-4 13 0 18" stroke="#fff" stroke-width="1.5" fill="none"/>
      <text class="uiTitle" x="54" y="21">Translate</text>
      <text class="uiCopy" x="54" y="38">Translate to English</text>
      <rect x="330" y="11" width="28" height="24" rx="7" fill="#4b2a64"/>
      <text class="small" x="337" y="28">⌘3</text>
    </g>
  </g>

  <g transform="translate(834 528)" filter="url(#softDrop)">
    <rect x="0" y="0" width="330" height="38" rx="13" fill="url(#card)" stroke="#fff" stroke-opacity=".08"/>
    <image href="jingle-mark.svg" x="14" y="7" width="24" height="24"/>
    <path d="M62 14c9-7 18-7 27 0M68 20c5-4 10-4 15 0M74 26h3" stroke="#fff" stroke-width="2.4" fill="none" stroke-linecap="round"/>
    <rect x="111" y="15" width="20" height="10" rx="2" fill="none" stroke="#fff" stroke-opacity=".75"/>
    <circle cx="166" cy="20" r="6" fill="none" stroke="#fff" stroke-width="2"/>
    <path d="M171 25l5 5" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
    <text class="uiTitle" x="238" y="24">Tue 10:30 AM</text>
  </g>

  <g transform="translate(834 612)" filter="url(#softDrop)">
    <rect x="0" y="0" width="170" height="226" rx="22" fill="url(#card)" stroke="#fff" stroke-opacity=".08"/>
    <image href="jingle-mark.svg" x="22" y="22" width="34" height="34"/>
    <circle cx="134" cy="32" r="2.2" fill="#b8afa1"/>
    <circle cx="144" cy="32" r="2.2" fill="#b8afa1"/>
    <rect x="22" y="78" width="126" height="28" rx="11" fill="#fff" fill-opacity=".07"/>
    <text class="uiTitle" x="32" y="97">All</text>
    <text class="uiCopy" x="130" y="97">12</text>
    <text class="uiCopy" x="32" y="129">Tools</text>
    <text class="uiCopy" x="130" y="129">28</text>
    <text class="uiCopy" x="32" y="158">AI Actions</text>
    <text class="uiCopy" x="130" y="158">14</text>
    <text class="uiCopy" x="32" y="187">Extensions</text>
    <text class="uiCopy" x="130" y="187">23</text>
  </g>

  <g transform="translate(1204 500)" filter="url(#softDrop)">
    <rect x="0" y="0" width="210" height="304" rx="24" fill="url(#card)" stroke="#fff" stroke-opacity=".09"/>
    <image href="jingle-mark.svg" x="24" y="24" width="46" height="46"/>
    <text class="small" x="84" y="48">All concepts at small sizes</text>
    <g transform="translate(26 96)">
      <image href="variants/jingle-variant-01-bell-pocket.svg" x="0" y="0" width="40" height="40"/>
      <image href="variants/jingle-variant-03-utility-pocket.svg" x="55" y="0" width="40" height="40"/>
      <image href="variants/jingle-variant-05-magic-drawer.svg" x="110" y="0" width="40" height="40"/>
      <text class="mono" x="16" y="62">1</text>
      <text class="mono" x="71" y="62">3</text>
      <text class="mono" x="126" y="62">5</text>
    </g>
    <g transform="translate(26 188)">
      <image href="variants/jingle-variant-02-j-chime.svg" x="0" y="0" width="40" height="40"/>
      <image href="variants/jingle-variant-04-command-tile.svg" x="55" y="0" width="40" height="40"/>
      <image href="variants/jingle-variant-06-minimal-jingle.svg" x="110" y="0" width="40" height="40"/>
      <text class="mono" x="16" y="62">2</text>
      <text class="mono" x="71" y="62">4</text>
      <text class="mono" x="126" y="62">6</text>
    </g>
  </g>
</svg>
