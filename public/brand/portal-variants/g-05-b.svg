<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-labelledby="title desc">
  <title id="title">G-05B Signal Portal</title>
  <desc id="desc">A G-05 portal variant with a clearer chime signal and a taller inner pocket.</desc>
  <defs>
    <linearGradient id="bg" x1="15" y1="7" x2="86" y2="94" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#25352f"/>
      <stop offset=".56" stop-color="#101815"/>
      <stop offset="1" stop-color="#050807"/>
    </linearGradient>
    <radialGradient id="halo" cx="50" cy="42" r="42" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#315d40" stop-opacity=".5"/>
      <stop offset=".62" stop-color="#132118" stop-opacity=".13"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ring" x1="30" y1="16" x2="72" y2="84" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fff1a8"/>
      <stop offset=".24" stop-color="#e5c84d"/>
      <stop offset=".58" stop-color="#58d878"/>
      <stop offset="1" stop-color="#07955b"/>
    </linearGradient>
    <radialGradient id="inside" cx="48" cy="40" r="32" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#253b31"/>
      <stop offset=".72" stop-color="#0a1110"/>
      <stop offset="1" stop-color="#030504"/>
    </radialGradient>
    <filter id="lift" x="-24%" y="-22%" width="148%" height="154%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#000000" flood-opacity=".4"/>
    </filter>
  </defs>
  <rect x="5.5" y="5.5" width="89" height="89" rx="25.5" fill="url(#bg)"/>
  <rect x="5.5" y="5.5" width="89" height="89" rx="25.5" fill="url(#halo)"/>
  <ellipse cx="50" cy="78.5" rx="20" ry="5.8" fill="#000000" opacity=".18"/>
  <g filter="url(#lift)">
    <rect x="28.5" y="17" width="43" height="66" rx="21.5" fill="url(#ring)"/>
    <rect x="37.5" y="27" width="25" height="46" rx="12.5" fill="url(#inside)"/>
    <path d="M39.5 34.2c5.7-6 15.4-6 21 0" fill="none" stroke="#faffbd" stroke-linecap="round" stroke-width="3.2" opacity=".56"/>
    <path d="M35.5 59c2.9 7.9 8.3 12 14.5 12s11.6-4.1 14.5-12" fill="none" stroke="#f1de73" stroke-linecap="round" stroke-width="2.4" opacity=".34"/>
  </g>
  <path d="M60 27c5.7-2.2 10.6-.8 14.5 4" fill="none" stroke="#70e993" stroke-linecap="round" stroke-width="3" opacity=".52"/>
</svg>
