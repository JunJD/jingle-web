<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-labelledby="title desc">
  <title id="title">G-05A Calm Portal</title>
  <desc id="desc">A softer G-05 portal variant with a wider doorway and quieter highlights.</desc>
  <defs>
    <linearGradient id="bg" x1="14" y1="7" x2="86" y2="94" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#293a32"/>
      <stop offset=".56" stop-color="#101815"/>
      <stop offset="1" stop-color="#050807"/>
    </linearGradient>
    <radialGradient id="halo" cx="50" cy="43" r="42" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#315d40" stop-opacity=".44"/>
      <stop offset=".68" stop-color="#132018" stop-opacity=".12"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ring" x1="28" y1="16" x2="75" y2="84" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fff0a6"/>
      <stop offset=".28" stop-color="#dbc64d"/>
      <stop offset=".6" stop-color="#55d574"/>
      <stop offset="1" stop-color="#0a8e58"/>
    </linearGradient>
    <radialGradient id="inside" cx="48" cy="40" r="32" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22372e"/>
      <stop offset=".72" stop-color="#0a1110"/>
      <stop offset="1" stop-color="#030504"/>
    </radialGradient>
    <filter id="lift" x="-24%" y="-22%" width="148%" height="154%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#000000" flood-opacity=".36"/>
    </filter>
  </defs>
  <rect x="5.5" y="5.5" width="89" height="89" rx="25.5" fill="url(#bg)"/>
  <rect x="5.5" y="5.5" width="89" height="89" rx="25.5" fill="url(#halo)"/>
  <ellipse cx="50" cy="78" rx="22" ry="6" fill="#000000" opacity=".16"/>
  <g filter="url(#lift)">
    <rect x="25.5" y="18" width="49" height="64" rx="24.5" fill="url(#ring)"/>
    <rect x="36.5" y="29" width="27" height="42" rx="13.5" fill="url(#inside)"/>
    <path d="M39 35c5.9-6.1 16.1-6.1 22 0" fill="none" stroke="#f9ffc0" stroke-linecap="round" stroke-width="3" opacity=".5"/>
    <path d="M36 58.5c2.9 7.5 8.2 11.4 14 11.4s11.1-3.9 14-11.4" fill="none" stroke="#f1df75" stroke-linecap="round" stroke-width="2.5" opacity=".28"/>
  </g>
</svg>
