<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-labelledby="title desc">
  <title id="title">Eye Lab E-13 Side Light</title>
  <desc id="desc">Command capsule with a stronger right-side light source, clarifying the direction of gaze and the depth of the surface.</desc>
  <defs>
    <linearGradient id="bg" x1="12" y1="8" x2="88" y2="94" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2b3631"/>
      <stop offset=".48" stop-color="#101714"/>
      <stop offset="1" stop-color="#060807"/>
    </linearGradient>
    <radialGradient id="beam" cx="78" cy="42" r="46" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#89f5a4" stop-opacity=".3"/>
      <stop offset=".3" stop-color="#34c879" stop-opacity=".18"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="capsule" x1="84" y1="34" x2="17" y2="67" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset=".38" stop-color="#eef8eb"/>
      <stop offset="1" stop-color="#bfd5c6"/>
    </linearGradient>
    <linearGradient id="sideRim" x1="70" y1="36" x2="81" y2="63" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity=".68"/>
      <stop offset="1" stop-color="#d9f4df" stop-opacity=".16"/>
    </linearGradient>
    <linearGradient id="green" x1="58" y1="31" x2="78" y2="58" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#e6ff90"/>
      <stop offset="1" stop-color="#28c97b"/>
    </linearGradient>
    <filter id="shadow" x="-26%" y="-30%" width="152%" height="170%">
      <feDropShadow dx="-4" dy="9" stdDeviation="6" flood-color="#000000" flood-opacity=".4"/>
    </filter>
    <filter id="dot" x="-90%" y="-90%" width="280%" height="280%">
      <feDropShadow dx="-2" dy="4" stdDeviation="2.7" flood-color="#000000" flood-opacity=".34"/>
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#38d980" flood-opacity=".28"/>
    </filter>
  </defs>
  <rect x="5.5" y="5.5" width="89" height="89" rx="25.5" fill="url(#bg)"/>
  <rect x="5.5" y="5.5" width="89" height="89" rx="25.5" fill="url(#beam)"/>
  <g filter="url(#shadow)">
    <rect x="18.2" y="35" width="63.8" height="30" rx="15" fill="url(#capsule)"/>
    <path d="M72 37.8c4.4 3 6.4 7.1 6.1 12.3-.3 5.1-2.9 9.2-7.2 12" fill="none" stroke="url(#sideRim)" stroke-linecap="round" stroke-width="2.4"/>
    <circle cx="33.4" cy="49.7" r="5.8" fill="none" stroke="#65736c" stroke-width="3"/>
    <circle cx="35.2" cy="49.1" r="1.65" fill="#65736c"/>
    <path d="M39.4 54.4l4.3 4.3" stroke="#65736c" stroke-width="2.7" stroke-linecap="round"/>
    <path d="M49.8 49.6h11" stroke="#56625d" stroke-width="3.7" stroke-linecap="round"/>
    <g filter="url(#dot)">
      <circle cx="69.6" cy="48.3" r="6.2" fill="url(#green)"/>
      <circle cx="70.8" cy="46.6" r="1.45" fill="#efffd5" opacity=".82"/>
    </g>
  </g>
  <path d="M58.8 29.2c6.8-4.5 15.1-3.3 20.7 2.7" fill="none" stroke="#80f0a0" stroke-linecap="round" stroke-width="3.4"/>
</svg>
